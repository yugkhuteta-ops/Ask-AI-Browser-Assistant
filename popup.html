<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ask AI</title>
    <style>
        body {
            margin: 0;
            padding: 14px;
            font-family: "Segoe UI", system-ui, -apple-system, BlinkMacSystemFont,
                "Helvetica Neue", Arial, sans-serif;
            width: 320px;
            box-sizing: border-box;

            /* dark mode only */
            background: #0b1220;
            color: #e5e7eb;
        }

        .card {
            background: #0f172a;
            border-radius: 16px;
            padding: 12px;
            border: 1px solid rgba(148, 163, 184, 0.18);
            box-shadow:
                0 16px 40px rgba(0, 0, 0, 0.35),
                0 2px 10px rgba(0, 0, 0, 0.25);
        }

        button {
            width: 100%;
            padding: 10px 12px;
            border: 0;
            border-radius: 12px;
            font-weight: 800;
            cursor: pointer;
            transition: transform 120ms ease, box-shadow 120ms ease, background 120ms ease;
        }

        .secondary {
            background: rgba(148, 163, 184, 0.12);
            border: 1px solid rgba(148, 163, 184, 0.22);
            color: #e5e7eb;
        }

        .secondary:hover {
            transform: translateY(-1px);
            box-shadow: 0 10px 22px rgba(0, 0, 0, 0.35);
            background: rgba(148, 163, 184, 0.18);
        }

        .row {
            display: flex;
            gap: 10px;
        }

        .small {
            font-size: 12px;
            color: rgba(226, 232, 240, 0.72);
            margin-top: 12px;
            line-height: 1.4;
        }

        select {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid rgba(148, 163, 184, 0.22);
            background: rgba(148, 163, 184, 0.10);
            color: #e5e7eb;
            border-radius: 12px;
            font-weight: 800;
            cursor: pointer;
            outline: none;
        }

        select:hover {
            background: rgba(148, 163, 184, 0.14);
        }

        select option {
            background: #0f172a;
            color: #e5e7eb;
        }

        .provider-preview {
            margin-top: 10px;
            padding: 10px 12px;
            border-radius: 12px;
            border: 1px solid rgba(148, 163, 184, 0.20);
            background: rgba(148, 163, 184, 0.08);
        }

        .provider-preview .top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
        }

        .provider-preview .label {
            font-weight: 900;
            font-size: 13px;
        }

        .provider-preview .badge {
            width: 14px;
            height: 14px;
            border-radius: 4px;
            background: linear-gradient(135deg, #10a37f, #0e8f6e);
        }

        .provider-preview .hint {
            margin-top: 4px;
            font-size: 12px;
            color: rgba(226, 232, 240, 0.72);
            line-height: 1.3;
        }
    </style>
</head>

<body>
    <div class="card">
        <button id="open-options" class="secondary">Open extension settings</button>

        <div class="row" style="margin-top: 10px;">
            <select id="provider-select"
                style="width:100%; padding:10px 12px; border:0; border-radius:10px; font-weight:600; cursor:pointer;">
                <option value="chatgpt">Ask ChatGPT</option>
                <option value="gemini">Ask Gemini</option>
                <option value="perplexity">Ask Perplexity</option>
            </select>
        </div>

        <div class="provider-preview" aria-live="polite" style="margin-top: 10px;">
            <div class="top">
                <div class="label" id="provider-preview-label">Ask ChatGPT</div>
                <div class="badge" id="provider-preview-badge"
                    style="background: linear-gradient(135deg, #10a37f, #0e8f6e);"></div>
            </div>
            <div class="hint">Provider selection updates the floating “Ask AI” button behavior.</div>
        </div>

        <div class="small">
            This extension injects a floating “Ask AI” button near selected text.
        </div>
    </div>

    <script src="popup.js"></script>
</body>

</html>
